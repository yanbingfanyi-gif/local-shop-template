<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通用企业官网 Starter Kit | 3天交付 · 移动端优先 · 本地商家网站模板</title>
  <meta name="description" content="零代码、配置驱动的本地商家网站模板 —— 适合餐饮、零售、美业等中小商家，3天即可上线专属官网。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://local-shop-template.vercel.app" />
  <meta property="og:title" content="通用企业官网 Starter Kit | 3天交付 · 移动端优先 · 本地商家网站模板" />
  <meta property="og:description" content="零代码、配置驱动的本地商家网站模板 —— 适合餐饮、零售、美业等中小商家，3天即可上线专属官网。" />
  <meta property="og:locale" content="zh_CN" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="通用企业官网 Starter Kit | 3天交付 · 移动端优先 · 本地商家网站模板" />
  <meta name="twitter:description" content="零代码、配置驱动的本地商家网站模板 —— 适合餐饮、零售、美业等中小商家，3天即可上线专属官网。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <!--
    ============================================================
    通用企业官网 Starter Kit
    ============================================================
    这是一个零依赖、纯静态的网站模板。所有可变内容（站点名称、
    Logo、配色、导航、联系方式、各页面文案）都集中在
    assets/js/config.js 中，由 assets/js/script.js 在页面加载时
    读取并渲染到下方各个容器里。

    换一个客户 / 换一个行业，只需要编辑 config.js，
    不需要改动本文件、style.css 或 script.js。
    ============================================================
  -->
</head>
<body>

  <!-- 作品展示横幅 — 内容/显示与否由 config.js 的 meta.demoBanner 控制 -->
  <div id="demoBanner"></div>

  <div id="progress-bar"></div>

  <!-- ── TOPBAR ── -->
  <div id="topbar">
    <div class="container topbar-inner">
      <span id="topbarAddress"></span>
      <span class="topbar-divider">|</span>
      <span id="topbarPhone"></span>
      <span class="topbar-divider">|</span>
      <span id="topbarHours"></span>
    </div>
  </div>

  <!-- ── NAVBAR ── -->
  <nav id="navbar">
    <div class="container nav-inner">
      <a href="#hero" class="nav-logo" id="navLogo"></a>
      <ul class="nav-links" id="navLinks"></ul>
      <button class="theme-toggle" id="themeToggle" aria-label="切换配色方案" title="切换配色方案"></button>
      <button class="hamburger" id="hamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="container hero-content">
      <p class="hero-eyebrow fade-in" id="heroEyebrow"></p>
      <h1 class="hero-title fade-in" id="heroTitle"></h1>
      <p class="hero-desc fade-in" id="heroDesc"></p>
      <div class="hero-cta fade-in">
        <a href="#" class="btn btn-primary" id="heroCtaPrimary"></a>
        <a href="#" target="_blank" rel="noopener" class="btn btn-outline-white" id="heroCtaSecondary"></a>
      </div>
      <div class="hero-highlights fade-in" id="heroHighlights"></div>
    </div>
    <a href="#about" class="scroll-hint">
      <span>向下滑动</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </a>
  </section>

  <!-- ── ABOUT ── -->
  <section id="about" class="section">
    <div class="container">
      <div class="about-grid">
        <div class="about-images fade-in">
          <div class="img-main img-placeholder">
            <span class="ph-icon">🖼️</span>
            <span class="ph-label">建议替换：品牌相关实拍图</span>
          </div>
          <div class="img-secondary img-placeholder">
            <span class="ph-icon">🖼️</span>
          </div>
          <div class="img-badge">
            <span class="badge-num counter" id="aboutBadgeNum">0</span>
            <span class="badge-txt" id="aboutBadgeTxt"></span>
          </div>
        </div>
        <div class="about-text fade-in">
          <p class="section-eyebrow" id="aboutEyebrow"></p>
          <h2 class="section-title-left" id="aboutTitle"></h2>
          <p class="about-quote" id="aboutQuote"></p>
          <p class="about-attr" id="aboutAuthor"></p>
          <div id="aboutParagraphs"></div>
          <div class="about-stats" id="aboutStats"></div>
          <a href="#services" class="btn btn-primary">查看服务项目</a>
        </div>
      </div>
    </div>
  </section>

  <!-- ── SERVICES ── -->
  <section id="services" class="section section-dark">
    <div class="container">
      <p class="section-eyebrow center fade-in" id="servicesEyebrow"></p>
      <h2 class="section-title fade-in" id="servicesTitle"></h2>
      <p class="section-desc fade-in" style="color:rgba(255,255,255,.6)" id="servicesIntro"></p>
      <div class="menu-tabs fade-in" id="servicesTabs"></div>
      <div class="menu-grid" id="servicesGrid"></div>
      <div class="menu-footer fade-in">
        <p id="servicesFooterNote"></p>
        <a href="#" class="btn btn-primary" id="servicesFooterCta">致电预订 / 咨询</a>
      </div>
    </div>
  </section>

  <!-- ── GALLERY ── -->
  <section id="gallery" class="section">
    <div class="container">
      <p class="section-eyebrow center fade-in" id="galleryEyebrow"></p>
      <h2 class="section-title fade-in" id="galleryTitle"></h2>
      <div class="gallery-grid fade-in" id="galleryGrid"></div>
    </div>
  </section>

  <!-- ── REVIEWS ── -->
  <section id="reviews" class="section section-dark">
    <div class="container">
      <p class="section-eyebrow center fade-in" id="reviewsEyebrow"></p>
      <h2 class="section-title fade-in" id="reviewsTitle"></h2>
      <div class="reviews-grid" id="reviewsGrid"></div>
      <div class="reviews-summary fade-in" id="reviewsSummary"></div>
    </div>
  </section>

  <!-- ── VISIT US ── -->
  <section id="visit" class="section section-cream">
    <div class="container">
      <p class="section-eyebrow center fade-in" id="visitEyebrow"></p>
      <h2 class="section-title fade-in" id="visitTitle"></h2>
      <p class="section-desc fade-in" id="visitIntro"></p>
      <div class="visit-grid">

        <div class="visit-card fade-in">
          <h3>🕐 营业时间</h3>
          <div class="hours-list">
            <div class="hour-row"><span>周一至周五</span><span id="hoursWeekday"></span></div>
            <div class="hour-row"><span>周六 · 周日</span><span id="hoursWeekend"></span></div>
            <div class="hour-row"><span>法定节假日</span><span id="hoursHoliday"></span></div>
          </div>
        </div>

        <div class="visit-card fade-in">
          <h3>📍 门店地址</h3>
          <p class="address" id="visitAddress"></p>
          <a href="#" target="_blank" rel="noopener" class="btn btn-outline-dark btn-sm" id="visitMapLink" style="margin-top:.75rem">导航前往</a>
        </div>

        <div class="visit-card fade-in">
          <h3>📞 联系方式</h3>
          <p>电话：<a href="#" id="visitPhoneLink"></a></p>
          <p>微信号：<span id="visitWechat"></span></p>
          <button class="btn btn-outline-dark btn-sm" id="openWechat" type="button">查看微信二维码</button>
        </div>

        <div class="visit-card visit-qr fade-in">
          <h3>💬 扫码加微信</h3>
          <button type="button" class="qr-img-btn" id="visitQrBtn" aria-label="点击放大微信二维码">
            <img src="" alt="微信二维码占位图，请替换为真实二维码" class="qr-img" id="visitQrImg" />
          </button>
          <p class="qr-caption" id="visitQrCaption"></p>
        </div>

      </div>
    </div>
  </section>

  <!-- ── CAREERS / JOIN US ── -->
  <section id="careers" class="section">
    <div class="container">
      <p class="section-eyebrow center fade-in" id="careersEyebrow"></p>
      <h2 class="section-title fade-in" id="careersTitle"></h2>
      <p class="section-desc fade-in" id="careersIntro"></p>
      <div class="careers-grid" id="careersGrid"></div>
      <div class="careers-cta fade-in">
        <p id="careersCtaText"></p>
        <a href="#" class="btn btn-primary" id="careersCtaBtn"></a>
      </div>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-top">
      <div class="container footer-grid">
        <div class="footer-brand">
          <div class="footer-logo" id="footerLogo"></div>
          <p id="footerDesc"></p>
          <div class="footer-socials" id="footerSocials"></div>
        </div>
        <div class="footer-col">
          <h5>快速链接</h5>
          <ul id="footerNavLinks"></ul>
        </div>
        <div class="footer-col">
          <h5>联系我们</h5>
          <ul class="footer-contact" id="footerContact"></ul>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="container footer-bottom-inner">
        <span id="footerCopyright"></span>
        <span class="footer-credit" id="footerCredit"></span>
      </div>
    </div>
  </footer>

  <!-- ── MOBILE STICKY BAR ── -->
  <div class="mobile-bar">
    <a href="#" class="mobile-bar-item" id="mobileBarPhone">
      <span class="mb-icon">📞</span><span class="mb-label">电话</span>
    </a>
    <a href="#" target="_blank" rel="noopener" class="mobile-bar-item" id="mobileBarMap">
      <span class="mb-icon">📍</span><span class="mb-label">导航</span>
    </a>
    <button class="mobile-bar-item" id="mobileBarWechat" type="button">
      <span class="mb-icon">💬</span><span class="mb-label">微信</span>
    </button>
  </div>

  <!-- ── WECHAT QR MODAL ── -->
  <div class="qr-modal" id="qrModal" aria-hidden="true">
    <div class="qr-modal-backdrop" id="qrModalBackdrop"></div>
    <div class="qr-modal-content">
      <button class="qr-modal-close" id="qrModalClose" aria-label="关闭">×</button>
      <h3>扫码添加微信</h3>
      <img src="" alt="微信二维码占位图，请替换为真实二维码" id="qrModalImg" />
      <p>微信号：<span id="qrModalWechat"></span></p>
    </div>
  </div>

  <button id="back-to-top" aria-label="回到顶部">↑</button>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
